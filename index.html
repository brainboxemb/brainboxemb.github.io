<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainbox Embedded</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px 60px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.5;
            color: #0b3154;
            background: #ffffff;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: block;
            width: 100%;
            max-width: 275px;
            height: auto;
            margin: 0 auto 20px;
        }

        .intro {
            max-width: 700px;
            margin: 0 auto;
            color: #596874;
            font-size: 1rem;
        }

        main {
            border-top: 1px solid #d7e0e5;
            padding-top: 30px;
        }

        .category {
            margin-bottom: 40px;
        }

        .category-title {
            margin: 0 0 12px;
            font-size: 1.4rem;
            color: #0b3154;
        }

        .link-list {
            margin: 0;
            padding: 0;
            list-style: none;
            border-top: 1px solid #d7e0e5;
        }

        .link-item {
            border-bottom: 1px solid #d7e0e5;
        }

        .link-item a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 10px;
            text-decoration: none;
            color: inherit;
            transition: background-color 0.15s ease;
        }

        .link-item a:hover {
            background-color: #f6fbf9;
        }

        .bullet {
            flex: 0 0 auto;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #12a875;
        }

        .link-content {
            flex: 1;
        }

        .link-title {
            display: block;
            color: #125fc6;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .description {
            display: block;
            margin-top: 3px;
            color: #596874;
            font-size: 0.95rem;
        }

        .arrow {
            flex: 0 0 auto;
            color: #12a875;
            font-size: 1.5rem;
        }

        footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #d7e0e5;
            text-align: center;
            color: #8a97a3;
            font-size: 0.9rem;
        }

    </style>
</head>

<body>

    <header class="header">

        <img
            src="logo_small.png"
            alt="Brainbox Embedded Logo"
            class="logo">

        <p class="intro">
            Welcome! This page contains links to my projects, experiments and notes.
        </p>

    </header>

    <main>

        <section class="category">

            <h2 class="category-title">
                Learning Hugo
            </h2>

            <ul class="link-list">

                <li class="link-item">
                    <a href="https://brainboxemb.github.io/site.hugo-step001/">

                        <span class="bullet"></span>

                        <span class="link-content">
                            <span class="link-title">
                                Hugo Step 1
                            </span>

                            <span class="description">
                                A simple first hugo site with blog posts and using roadster theme.
                            </span>
                        </span>

                        <span class="arrow">→</span>

                    </a>
                </li>

                <!-- Add Hugo Step 2 here -->

            </ul>

        </section>


        <section class="category">

            <h2 class="category-title">
                Embedded Projects
            </h2>

            <ul class="link-list">

                <li class="link-item">
                    <a href="#">

                        <span class="bullet"></span>

                        <span class="link-content">
                            <span class="link-title">
                                Coming Soon
                            </span>

                            <span class="description">
                                Future embedded systems projects.
                            </span>
                        </span>

                        <span class="arrow">→</span>

                    </a>
                </li>

            </ul>

        </section>

    </main>


    <footer>
        © 2026 Brainbox Embedded
    </footer>

</body>
</html>
