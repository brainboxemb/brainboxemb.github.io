<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Brainbox Embedded</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 60px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.6;
            color: #0b3154;
            background: #f7faf9;
        }

        .header {
            text-align: center;
            margin-bottom: 45px;
        }

        .logo {
            display: block;
            width: 100%;
            max-width: 500px;
            height: auto;
            margin: 0 auto 25px;
        }

        .intro {
            max-width: 650px;
            margin: 0 auto;
            color: #536471;
            font-size: 1.05rem;
        }

        h2 {
            margin: 0 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #13a675;
            font-size: 1.8rem;
        }

        h3 {
            margin: 30px 0 12px;
            font-size: 1.2rem;
        }

        .project-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .project {
            margin-bottom: 16px;
            padding: 20px;
            text-align: left;
            background: #ffffff;
            border: 1px solid #dce6e2;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(11, 49, 84, 0.06);
        }

        .project a {
            display: inline-block;
            margin-bottom: 4px;
            color: #0b5f9e;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
        }

        .project a:hover,
        .project a:focus {
            color: #13a675;
            text-decoration: underline;
        }

        .description {
            color: #66757f;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            color: #7a8790;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <header class="header">
        <img
            src="logo.png"
            alt="Brainbox Embedded logo"
            class="logo"
        >

        <p class="intro">
            Welcome! This page contains links to my projects and websites.
        </p>
    </header>

    <main>
        <h2>Projects</h2>

        <section>
            <h3>Learning Hugo</h3>

            <ul class="project-list">
                <li class="project">
                    <a href="https://brainboxemb.github.io/side.hugo-step001/">
                        Hugo Step 1
                    </a>

                    <div class="description">
                        A simple Hugo site with blog posts.
                    </div>
                </li>
            </ul>
        </section>
    </main>

    <footer>
        Brainbox Embedded
    </footer>
</body>
</html>
